<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belle Sand Hotel</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero {
  position: relative;
  height: 100vh;
  background: url("https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG") center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  text-align: center;
}

.btn-gold {
  background-color: #caa64b;
  border: none;
}

.btn-gold:hover {
  background-color: #b8943f;
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-overlay">
    <h1 class="display-4 fw-bold">Belle Sand Hotel ★★★</h1>
    <p class="lead">Reserva tu experiencia en Ica</p>
    <button class="btn btn-gold btn-lg" data-bs-toggle="modal" data-bs-target="#formModal">
      Solicitar Información
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Formulario de Contacto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="form">
          <div class="mb-3">
            <input type="text" class="form-control" name="nombre" placeholder="Nombre" required>
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" name="telefono" placeholder="Teléfono" required>
          </div>

          <div class="mb-3">
            <textarea class="form-control" name="mensaje" placeholder="Mensaje"></textarea>
          </div>

          <button type="submit" class="btn btn-gold w-100">Enviar</button>
        </form>

        <div class="mt-3 text-center fw-bold" id="respuesta"></div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const respuesta = document.getElementById("respuesta");
  respuesta.innerText = "Enviando...";

  const datos = {
    nombre: e.target.nombre.value,
    telefono: e.target.telefono.value,
    mensaje: e.target.mensaje.value
  };

  try {
    await fetch(
      "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec",
      {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(datos)
      }
    );

    respuesta.innerText = "Enviado correctamente";
    e.target.reset();

  } catch (error) {
    respuesta.innerText = "Error al enviar";
  }
});
</script>

</body>
</html>
