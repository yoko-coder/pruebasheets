<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belle Sand Hotel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero {
  position: relative;
  height: 100vh;
  background: url("https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG") center/cover no-repeat;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  text-align: center;
}
.btn-gold { background-color: #caa64b; border: none; }
.btn-gold:hover { background-color: #b8943f; }
</style>
</head>

<body>

<div class="hero">
  <div class="hero-overlay">
    <h1 class="display-4 fw-bold">Belle Sand Hotel ★★★</h1>

    <div class="d-flex gap-3 flex-wrap justify-content-center">

      <button class="btn btn-gold btn-lg" data-bs-toggle="modal" data-bs-target="#contactoModal">
        Contacto
      </button>

      <button class="btn btn-dark btn-lg" data-bs-toggle="modal" data-bs-target="#cajaModal">
        Registrar Caja
      </button>

      <button class="btn btn-success btn-lg" onclick="verContactos()">
        Ver Contactos
      </button>

      <button class="btn btn-primary btn-lg" onclick="verCaja()">
        Ver Caja1
      </button>

    </div>
  </div>
</div>

<div class="container my-5">
  <div id="tablaContainer"></div>
</div>

<!-- MODAL CONTACTO -->
<div class="modal fade" id="contactoModal">
<div class="modal-dialog"><div class="modal-content">
<div class="modal-header">
<h5>Contacto</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<form id="formContacto">
<input class="form-control mb-2" name="nombre" placeholder="Nombre" required>
<input class="form-control mb-2" name="telefono" placeholder="Teléfono" required>
<textarea class="form-control mb-2" name="mensaje" placeholder="Mensaje"></textarea>
<button class="btn btn-gold w-100">Enviar</button>
</form>
<div id="respuestaContacto" class="mt-2 fw-bold text-center"></div>
</div></div></div></div>

<!-- MODAL CAJA -->
<div class="modal fade" id="cajaModal">
<div class="modal-dialog"><div class="modal-content">
<div class="modal-header">
<h5>Caja1</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<form id="formCaja">
<input class="form-control mb-2" name="habitacion" placeholder="Habitación" required>
<input class="form-control mb-2" name="nombreCliente" placeholder="Nombre cliente" required>
<input type="number" step="0.01" class="form-control mb-2" name="monto" placeholder="Monto" required>
<select class="form-control mb-2" name="moneda">
<option>Soles</option>
<option>Dólares</option>
</select>
<select class="form-control mb-2" name="medioPago">
<option>Yape</option>
<option>Tarjeta</option>
<option>Efectivo</option>
</select>
<select class="form-control mb-2" name="tipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>
<button class="btn btn-dark w-100">Registrar</button>
</form>
<div id="respuestaCaja" class="mt-2 fw-bold text-center"></div>
</div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

async function postData(datos) {

  const formBody = new URLSearchParams();

  for (const key in datos) {
    formBody.append(key, datos[key]);
  }

  await fetch(URL, {
    method: "POST",
    body: formBody
  });
}

document.getElementById("formContacto").onsubmit = async e => {
  e.preventDefault();
  await postData({
    accion:"contacto",
    nombre:e.target.nombre.value,
    telefono:e.target.telefono.value,
    mensaje:e.target.mensaje.value
  });
  document.getElementById("respuestaContacto").innerText="Enviado";
  e.target.reset();
};

document.getElementById("formCaja").onsubmit = async e => {
  e.preventDefault();
  await postData({
    accion:"caja1",
    habitacion:e.target.habitacion.value,
    nombreCliente:e.target.nombreCliente.value,
    monto:e.target.monto.value,
    moneda:e.target.moneda.value,
    medioPago:e.target.medioPago.value,
    tipo:e.target.tipo.value
  });
  document.getElementById("respuestaCaja").innerText="Registrado";
  e.target.reset();
};

async function verContactos(){
  const res = await fetch(URL + "?accion=verContactos");
  const data = await res.json();
  renderTabla(data);
}

async function verCaja(){
  const res = await fetch(URL + "?accion=verCaja1");
  const data = await res.json();
  renderTabla(data);
}

function renderTabla(data){
  let html="<table class='table table-bordered table-striped'><tbody>";
  data.forEach(row=>{
    html+="<tr>";
    row.forEach(col=>{
      html+="<td>"+col+"</td>";
    });
    html+="</tr>";
  });
  html+="</tbody></table>";
  document.getElementById("tablaContainer").innerHTML=html;
}

</script>

</body>
</html>
