<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Belle Sand</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4efe6;
font-family: 'Segoe UI', sans-serif;
}

/* HERO */
.hero{
background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG');
background-size:cover;
background-position:center;
height:60vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:3rem;
letter-spacing:2px;
font-weight:300;
}

/* Colores Belle Sand */
.btn-belle{
background:#c2a878;
color:white;
border:none;
}

.btn-belle:hover{
background:#b89a66;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.section-title{
color:#1f2f46;
font-weight:600;
}

.nav-tabs .nav-link{
color:#1f2f46;
}

.nav-tabs .nav-link.active{
background:#1f2f46;
color:white;
border-radius:10px;
}

.table{
border-radius:15px;
overflow:hidden;
}

.room-img{
width:100%;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div>
<h1>Panel Belle Sand</h1>
<p>Gestión de contactos y caja</p>
</div>
</div>

<div class="container my-5">

<!-- Imagen habitación -->
<div class="mb-5 text-center">
<img class="room-img"
src="https://www.hotelbellesand.com/images/home/ourbest/img-1.jpg">
</div>

<ul class="nav nav-tabs mb-4">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#contactos">Contactos</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#caja">Caja</button>
</li>
</ul>

<div class="tab-content">

<!-- CONTACTOS -->
<div class="tab-pane fade show active" id="contactos">

<div class="card p-4 mb-4">
<h4 class="section-title mb-3">Registrar Contacto</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="contacto">

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" name="telefono" placeholder="Teléfono" required>
</div>
</div>

<textarea class="form-control mb-3" name="mensaje" placeholder="Mensaje"></textarea>

<button class="btn btn-belle w-100">Enviar</button>
</form>
</div>

<div class="card p-4">
<button onclick="verContactos()" class="btn btn-outline-dark mb-3">Ver Contactos</button>
<div id="tablaContactos"></div>
</div>

</div>

<!-- CAJA -->
<div class="tab-pane fade" id="caja">

<div class="card p-4 mb-4">
<h4 class="section-title mb-3">Registrar Movimiento</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="caja1">

<div class="row">
<div class="col-md-4">
<input class="form-control mb-3" name="habitacion" placeholder="Habitación" required>
</div>
<div class="col-md-4">
<input class="form-control mb-3" name="nombreCliente" placeholder="Cliente" required>
</div>
<div class="col-md-4">
<input type="number" step="0.01" class="form-control mb-3" name="monto" placeholder="Monto" required>
</div>
</div>

<div class="row">
<div class="col-md-4">
<select class="form-control mb-3" name="moneda">
<option>Soles</option>
<option>Dólares</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="medioPago">
<option>Yape</option>
<option>Tarjeta</option>
<option>Efectivo</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="tipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>
</div>
</div>

<button class="btn btn-belle w-100">Registrar</button>
</form>
</div>

<div class="card p-4">
<button onclick="verCaja()" class="btn btn-outline-dark mb-3">Ver Caja</button>
<div id="tablaCaja"></div>
</div>

</div>

</div>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

const url="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

function crearTabla(data){
let html="<div class='table-responsive'><table class='table table-bordered'>";
data.forEach(fila=>{
html+="<tr>";
fila.forEach(col=>{
html+="<td>"+col+"</td>";
});
html+="</tr>";
});
html+="</table></div>";
return html;
}

function verContactos(){
fetch(url+"?accion=verContactos")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaContactos").innerHTML=crearTabla(data);
});
}

function verCaja(){
fetch(url+"?accion=verCaja1")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaCaja").innerHTML=crearTabla(data);
});
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
