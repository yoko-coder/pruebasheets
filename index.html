<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Formulario</title>
</head>
<body>

<h2>Formulario de Registro</h2>

<form id="form">
  <input type="text" name="nombre" placeholder="Nombre" required><br><br>
  <input type="text" name="telefono" placeholder="Teléfono" required><br><br>
  <textarea name="mensaje" placeholder="Mensaje"></textarea><br><br>
  <button type="submit">Enviar</button>
</form>

<p id="respuesta"></p>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const datos = {
    nombre: e.target.nombre.value,
    telefono: e.target.telefono.value,
    mensaje: e.target.mensaje.value
  };

  try {
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec",
      {
        method: "POST",
        body: JSON.stringify(datos)
      }
    );

    const result = await response.json();
    document.getElementById("respuesta").innerText = "Enviado correctamente";
    e.target.reset();

  } catch (error) {
    document.getElementById("respuesta").innerText = "Error al enviar";
  }
});
</script>

</body>
</html>
