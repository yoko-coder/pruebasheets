```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Belle Sand</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f3ec;
font-family:'Segoe UI',sans-serif;
}

/* LOGIN */

.login-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG');
background-size:cover;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
}

.login-title{
font-size:24px;
color:#1f2f46;
margin-bottom:20px;
}

/* PANEL */

.panel{
display:none;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#1f2f46;
color:white;
padding:25px;
}

.sidebar h3{
font-weight:300;
letter-spacing:1px;
margin-bottom:40px;
}

.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
background:transparent;
color:white;
padding:10px;
border-radius:8px;
text-align:left;
}

.menu-btn:hover{
background:#32435c;
}

/* TOPBAR */

.topbar{
background:white;
padding:15px 30px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* CARDS */

.card{
border:none;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.section-title{
color:#1f2f46;
font-weight:600;
}

/* BUTTON */

.btn-belle{
background:#c2a878;
border:none;
color:white;
}

.btn-belle:hover{
background:#b89a66;
}

/* TABLE */

table{
background:white;
}

/* WHATSAPP */

.whatsapp-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
z-index:999;
}

.whatsapp-btn img{
width:100%;
border-radius:50%;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:transform 0.2s;
}

.whatsapp-btn img:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">

<div class="login-box">

<div class="login-title">Belle Sand Panel</div>

<input id="pass" type="password" class="form-control mb-3" placeholder="Contraseña">

<button onclick="login()" class="btn btn-belle w-100">Entrar</button>

</div>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h3>Belle Sand</h3>

<button class="menu-btn" onclick="mostrar('contactos')">Contactos</button>
<button class="menu-btn" onclick="mostrar('caja')">Caja</button>

</div>

<!-- CONTENT -->

<div class="col-md-10 p-0">

<div class="topbar">

Panel de administración

</div>

<div class="p-4">

<!-- CONTACTOS -->

<div id="contactos">

<div class="card p-4 mb-4">

<h4 class="section-title mb-3">Registrar Contacto</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="contacto">

<div class="row">

<div class="col-md-6">
<input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
</div>

<div class="col-md-6">
<input class="form-control mb-3" name="telefono" placeholder="Teléfono" required>
</div>

</div>

<textarea class="form-control mb-3" name="mensaje" placeholder="Mensaje"></textarea>

<button class="btn btn-belle w-100">Enviar</button>

</form>

</div>

<div class="card p-4">

<button onclick="verContactos()" class="btn btn-outline-dark mb-3">Ver Contactos</button>

<div id="tablaContactos"></div>

</div>

</div>

<!-- CAJA -->

<div id="caja" style="display:none">

<div class="card p-4 mb-4">

<h4 class="section-title mb-3">Registrar Movimiento</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="caja1">

<div class="row">

<div class="col-md-4">
<input class="form-control mb-3" name="habitacion" placeholder="Habitación" required>
</div>

<div class="col-md-4">
<input class="form-control mb-3" name="nombreCliente" placeholder="Cliente" required>
</div>

<div class="col-md-4">
<input type="number" step="0.01" class="form-control mb-3" name="monto" placeholder="Monto" required>
</div>

</div>

<div class="row">

<div class="col-md-4">
<select class="form-control mb-3" name="moneda">
<option>Soles</option>
<option>Dólares</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="medioPago">
<option>Yape</option>
<option>Tarjeta</option>
<option>Efectivo</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="tipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>
</div>

</div>

<button class="btn btn-belle w-100">Registrar</button>

</form>

</div>

<div class="card p-4">

<button onclick="verCaja()" class="btn btn-outline-dark mb-3">Ver Caja</button>

<div id="tablaCaja"></div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- WHATSAPP -->

<a href="https://wa.me/51956003102" target="_blank" class="whatsapp-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

const url="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

/* LOGIN */

function login(){

let p=document.getElementById("pass").value;

if(p==="bellesand123"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("panel").style.display="block";
}else{
alert("Contraseña incorrecta");
}

}

/* CAMBIAR SECCIÓN */

function mostrar(seccion){

document.getElementById("contactos").style.display="none";
document.getElementById("caja").style.display="none";

document.getElementById(seccion).style.display="block";

}

/* TABLAS */

function crearTabla(data){

let html="<div class='table-responsive'><table class='table table-striped table-bordered'>";

data.forEach(fila=>{
html+="<tr>";
fila.forEach(col=>{
html+="<td>"+col+"</td>";
});
html+="</tr>";
});

html+="</table></div>";

return html;

}

/* CONTACTOS */

function verContactos(){

fetch(url+"?accion=verContactos")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaContactos").innerHTML=crearTabla(data);
});

}

/* CAJA */

function verCaja(){

fetch(url+"?accion=verCaja1")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaCaja").innerHTML=crearTabla(data);
});

}

</script>

</body>
</html>
