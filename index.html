<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belle Sand | Exclusive Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1a2533;
            --accent-gold: #c2a878;
            --soft-white: #fcfaf7;
            --text-gray: #555;
        }

        body, html {
            margin: 0;
            font-family: 'Segoe UI', serif;
            background: var(--soft-white);
            scroll-behavior: smooth;
        }

        /* --- BOTÓN DISCRETO STAFF --- */
        .admin-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
        }
        .admin-trigger:hover { background: white; color: var(--primary-dark); }

        /* --- HERO SECTION --- */
        #hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            font-style: italic;
            opacity: 0.9;
        }

        /* --- GRID DE HABITACIONES --- */
        .rooms-section {
            padding: 80px 10%;
            background: var(--soft-white);
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--primary-dark);
            text-transform: uppercase;
        }

        .room-card {
            background: white;
            border: none;
            overflow: hidden;
            transition: transform 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .room-card:hover {
            transform: translateY(-10px);
        }

        .room-img {
            height: 300px;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease;
        }

        .room-card:hover .room-img {
            transform: scale(1.05);
        }

        .room-info {
            padding: 25px;
            text-align: center;
        }

        .room-info h3 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .room-price {
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- LOGIN OVERLAY --- */
        #loginOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 37, 51, 0.98);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        /* --- PANEL DE ADMIN --- */
        #panel { display: none; background: #f4f4f4; min-height: 100vh; }
        .sidebar { height: 100vh; background: var(--primary-dark); color: white; padding: 25px; }
        .menu-btn { width: 100%; background: transparent; border: none; color: white; padding: 12px; text-align: left; border-radius: 4px; margin-bottom: 8px; }
        .menu-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-belle { background: var(--accent-gold); color: white; border: none; padding: 10px; }

        .whatsapp-btn { position: fixed; bottom: 25px; right: 25px; width: 50px; z-index: 1000; transition: 0.3s; }
        .whatsapp-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="openLogin()">Staff Only</div>

    <div id="publicSite">
        <section id="hero">
            <h1 class="hero-title">Belle Sand</h1>
            <p class="hero-subtitle">EL ARTE DE LA CALMA</p>
        </section>

        <section class="rooms-section">
            <div class="section-header">
                <h2>Nuestras Suites</h2>
                <div style="width: 50px; height: 1px; background: var(--accent-gold); margin: 20px auto;"></div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="room-card">
                        <div class="room-img" style="background-image: url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496695/image-ica-belle-sand-hotel-42.JPEG');"></div>
                        <div class="room-info">
                            <h3>Suite Matrimonial</h3>
                            <p class="room-price">Desde S/ 250 por noche</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="room-card">
                        <div class="room-img" style="background-image: url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496701/image-ica-belle-sand-hotel-48.JPEG');"></div>
                        <div class="room-info">
                            <h3>Habitación Familiar</h3>
                            <p class="room-price">Desde S/ 380 por noche</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="room-card">
                        <div class="room-img" style="background-image: url('https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496698/image-ica-belle-sand-hotel-45.JPEG');"></div>
                        <div class="room-info">
                            <h3>Bungalow Deluxe</h3>
                            <p class="room-price">Desde S/ 450 por noche</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="loginOverlay">
        <div style="background: white; padding: 40px; border-radius: 4px; width: 320px; text-align: center;">
            <h5 class="mb-4" style="letter-spacing: 2px;">IDENTIFICACIÓN</h5>
            <input id="pass" type="password" class="form-control mb-3" placeholder="PIN de acceso">
            <button onclick="login()" class="btn btn-dark w-100 mb-2">ENTRAR</button>
            <button onclick="closeLogin()" class="btn btn-link btn-sm text-muted text-decoration-none">Cerrar</button>
        </div>
    </div>

    <div id="panel">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-2 sidebar">
                    <h4 class="mb-5">Belle Sand</h4>
                    <button class="menu-btn" onclick="mostrar('contactos')">Contactos</button>
                    <button class="menu-btn" onclick="mostrar('caja')">Caja</button>
                    <hr>
                    <button class="menu-btn" onclick="location.reload()">Salir</button>
                </div>
                <div class="col-md-10 p-0">
                    <div style="background: white; padding: 15px 30px; font-weight: bold; border-bottom: 1px solid #ddd;">Administración del Hotel</div>
                    <div class="p-4">
                        <div id="contactos">
                            <div class="card p-4 mb-4">
                                <h4 class="mb-3">Registrar Contacto</h4>
                                <form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec" method="POST" target="hidden_iframe">
                                    <input type="hidden" name="accion" value="contacto">
                                    <input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
                                    <input class="form-control mb-3" name="telefono" placeholder="Teléfono" required>
                                    <textarea class="form-control mb-3" name="mensaje" placeholder="Mensaje"></textarea>
                                    <button class="btn btn-belle w-100">Guardar</button>
                                </form>
                            </div>
                            <button onclick="verContactos()" class="btn btn-outline-dark mb-3">Refrescar Lista</button>
                            <div id="tablaContactos"></div>
                        </div>

                        <div id="caja" style="display:none">
                            <div class="card p-4 mb-4">
                                <h4 class="mb-3">Movimiento de Caja</h4>
                                <form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec" method="POST" target="hidden_iframe">
                                    <input type="hidden" name="accion" value="caja1">
                                    <div class="row">
                                        <div class="col-md-4"><input class="form-control mb-3" name="habitacion" placeholder="Hab."></div>
                                        <div class="col-md-4"><input class="form-control mb-3" name="nombreCliente" placeholder="Cliente"></div>
                                        <div class="col-md-4"><input type="number" step="0.01" class="form-control mb-3" name="monto" placeholder="Monto"></div>
                                    </div>
                                    <button class="btn btn-belle w-100">Registrar en Caja</button>
                                </form>
                            </div>
                            <button onclick="verCaja()" class="btn btn-outline-dark mb-3">Ver Historial</button>
                            <div id="tablaCaja"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <a href="https://wa.me/51956003102" target="_blank" class="whatsapp-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="100%">
    </a>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

        function openLogin() { document.getElementById("loginOverlay").style.display = "flex"; }
        function closeLogin() { document.getElementById("loginOverlay").style.display = "none"; }

        function login() {
            if(document.getElementById("pass").value === "bellesand123") {
                document.getElementById("publicSite").style.display = "none";
                document.getElementById("loginOverlay").style.display = "none";
                document.querySelector(".admin-trigger").style.display = "none";
                document.getElementById("panel").style.display = "block";
            } else { alert("Error de acceso"); }
        }

        function mostrar(sec) {
            document.getElementById("contactos").style.display = "none";
            document.getElementById("caja").style.display = "none";
            document.getElementById(sec).style.display = "block";
        }

        function crearTabla(data) {
            let html = "<div class='table-responsive'><table class='table table-sm table-striped'>";
            data.forEach(fila => {
                html += "<tr>";
                fila.forEach(col => { html += "<td>" + col + "</td>"; });
                html += "</tr>";
            });
            return html + "</table></div>";
        }

        function verContactos() {
            fetch(url + "?accion=verContactos").then(res=>res.json()).then(data=> {
                document.getElementById("tablaContactos").innerHTML = crearTabla(data);
            });
        }

        function verCaja() {
            fetch(url + "?accion=verCaja1").then(res=>res.json()).then(data=> {
                document.getElementById("tablaCaja").innerHTML = crearTabla(data);
            });
        }
    </script>
</body>
</html>
