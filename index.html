<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white p-4">

<div class="container">

<h2 class="mb-4">Sistema Google Sheets</h2>

<!-- ================= CONTACTO ================= -->

<div class="card bg-secondary p-3 mb-4">
<h4>Registrar Contacto</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="contacto">

<input class="form-control mb-2" name="nombre" placeholder="Nombre" required>
<input class="form-control mb-2" name="telefono" placeholder="Teléfono" required>
<textarea class="form-control mb-2" name="mensaje" placeholder="Mensaje"></textarea>

<button class="btn btn-light w-100">Enviar</button>
</form>

<button onclick="verContactos()" class="btn btn-dark mt-2 w-100">Ver Contactos</button>

<div id="tablaContactos" class="mt-3"></div>

</div>


<!-- ================= CAJA ================= -->

<div class="card bg-secondary p-3 mb-4">
<h4>Registrar Caja 1</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="caja1">

<input class="form-control mb-2" name="habitacion" placeholder="Habitación" required>
<input class="form-control mb-2" name="nombreCliente" placeholder="Nombre cliente" required>
<input type="number" step="0.01" class="form-control mb-2" name="monto" placeholder="Monto" required>

<select class="form-control mb-2" name="moneda">
<option>Soles</option>
<option>Dólares</option>
</select>

<select class="form-control mb-2" name="medioPago">
<option>Yape</option>
<option>Tarjeta</option>
<option>Efectivo</option>
</select>

<select class="form-control mb-2" name="tipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>

<button class="btn btn-light w-100">Registrar</button>
</form>

<button onclick="verCaja()" class="btn btn-dark mt-2 w-100">Ver Caja 1</button>

<div id="tablaCaja" class="mt-3"></div>

</div>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

const url = "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

function verContactos(){
fetch(url + "?accion=verContactos")
.then(res => res.json())
.then(data => {

let html = "<table class='table table-dark table-bordered'>";

data.forEach(fila => {
html += "<tr>";
fila.forEach(col => {
html += "<td>"+col+"</td>";
});
html += "</tr>";
});

html += "</table>";

document.getElementById("tablaContactos").innerHTML = html;

});
}

function verCaja(){
fetch(url + "?accion=verCaja1")
.then(res => res.json())
.then(data => {

let html = "<table class='table table-dark table-bordered'>";

data.forEach(fila => {
html += "<tr>";
fila.forEach(col => {
html += "<td>"+col+"</td>";
});
html += "</tr>";
});

html += "</table>";

document.getElementById("tablaCaja").innerHTML = html;

});
}

</script>

</body>
</html>
