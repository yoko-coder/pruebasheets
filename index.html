<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
}

.card{
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
border:none;
}

.btn-custom{
background:#ffc107;
border:none;
color:black;
font-weight:bold;
}

.btn-custom:hover{
background:#ffca2c;
}

.table{
border-radius:15px;
overflow:hidden;
}

.nav-tabs .nav-link{
color:white;
}

.nav-tabs .nav-link.active{
background:#ffc107;
color:black;
font-weight:bold;
}
</style>

</head>

<body class="text-white p-4">

<div class="container">

<h2 class="text-center mb-4">Panel de Gestión</h2>

<ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#contacto">Contactos</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#caja">Caja 1</button>
</li>
</ul>

<div class="tab-content">

<!-- ================= CONTACTOS ================= -->
<div class="tab-pane fade show active" id="contacto">

<div class="card bg-dark p-4 mb-4">
<h4 class="mb-3">Registrar Contacto</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="contacto">

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" name="telefono" placeholder="Teléfono" required>
</div>
</div>

<textarea class="form-control mb-3" name="mensaje" placeholder="Mensaje"></textarea>

<button class="btn btn-custom w-100">Enviar</button>
</form>
</div>

<div class="card bg-dark p-4">
<button onclick="verContactos()" class="btn btn-outline-light mb-3">Actualizar lista</button>
<div id="tablaContactos"></div>
</div>

</div>


<!-- ================= CAJA ================= -->
<div class="tab-pane fade" id="caja">

<div class="card bg-dark p-4 mb-4">
<h4 class="mb-3">Registrar Movimiento</h4>

<form action="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="accion" value="caja1">

<div class="row">
<div class="col-md-4">
<input class="form-control mb-3" name="habitacion" placeholder="Habitación" required>
</div>
<div class="col-md-4">
<input class="form-control mb-3" name="nombreCliente" placeholder="Cliente" required>
</div>
<div class="col-md-4">
<input type="number" step="0.01" class="form-control mb-3" name="monto" placeholder="Monto" required>
</div>
</div>

<div class="row">
<div class="col-md-4">
<select class="form-control mb-3" name="moneda">
<option>Soles</option>
<option>Dólares</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="medioPago">
<option>Yape</option>
<option>Tarjeta</option>
<option>Efectivo</option>
</select>
</div>

<div class="col-md-4">
<select class="form-control mb-3" name="tipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>
</div>
</div>

<button class="btn btn-custom w-100">Registrar</button>
</form>
</div>

<div class="card bg-dark p-4">
<button onclick="verCaja()" class="btn btn-outline-light mb-3">Actualizar Caja</button>
<div id="tablaCaja"></div>
</div>

</div>

</div>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const url="https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec";

function crearTabla(data){
let html="<div class='table-responsive'><table class='table table-dark table-hover table-bordered text-center'>";
data.forEach(fila=>{
html+="<tr>";
fila.forEach(col=>{
html+="<td>"+col+"</td>";
});
html+="</tr>";
});
html+="</table></div>";
return html;
}

function verContactos(){
fetch(url+"?accion=verContactos")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaContactos").innerHTML=crearTabla(data);
});
}

function verCaja(){
fetch(url+"?accion=verCaja1")
.then(res=>res.json())
.then(data=>{
document.getElementById("tablaCaja").innerHTML=crearTabla(data);
});
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
