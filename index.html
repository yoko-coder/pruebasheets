<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle Sand Hotel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.hero {
  position: relative;
  width: 100%;
  max-height: 576px;
  overflow: hidden;
}

.hero img {
  width: 100%;
  display: block;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.overlay h1 {
  font-size: 3em;
  margin: 0;
}

.overlay p {
  margin: 10px 0 20px 0;
}

.btn {
  padding: 12px 24px;
  background: #caa64b;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: #b8943f;
}

/* Modal */

.modal {
  display: none;
  position: fixed;
  z-index: 10;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border-radius: 8px;
  animation: fadeIn 0.3s ease-in-out;
}

.modal-content h2 {
  margin-top: 0;
}

.modal-content input,
.modal-content textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 12px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://belle-sand.hoteles-en-ica.com/data/Images/OriginalPhoto/1874/187496/187496703/image-ica-belle-sand-hotel-50.JPEG" alt="Belle Sand Hotel">
  <div class="overlay">
    <h1>Belle Sand Hotel ★★★</h1>
    <p>Reserva tu experiencia en Ica</p>
    <button class="btn" onclick="abrirModal()">Solicitar Información</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarModal()">×</span>
    <h2>Formulario de Contacto</h2>
    <form id="form">
      <input type="text" name="nombre" placeholder="Nombre" required>
      <input type="text" name="telefono" placeholder="Teléfono" required>
      <textarea name="mensaje" placeholder="Mensaje"></textarea>
      <button type="submit" class="btn">Enviar</button>
    </form>
    <p id="respuesta"></p>
  </div>
</div>

<script>
function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target == modal) {
    modal.style.display = "none";
  }
};

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const respuesta = document.getElementById("respuesta");
  respuesta.innerText = "Enviando...";

  const datos = {
    nombre: e.target.nombre.value,
    telefono: e.target.telefono.value,
    mensaje: e.target.mensaje.value
  };

  try {
    await fetch(
      "https://script.google.com/macros/s/AKfycbzf86CIa_B-kIDHppyeuqhm6ZW_QngreKFA_94l7EB724ix01NybCpuulLLhnuN1GWd/exec",
      {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(datos)
      }
    );

    respuesta.innerText = "Enviado correctamente";
    e.target.reset();

  } catch (error) {
    respuesta.innerText = "Error al enviar";
  }
});
</script>

</body>
</html>
